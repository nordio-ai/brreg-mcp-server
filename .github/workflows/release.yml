name: Release
# §7a: the `.mcpb` reaches users via a GitHub RELEASE — never committed (`*.mcpb` is gitignored).
# Tag `vX.Y.Z` → build → pack (prod-only staging) → attach to the Release → publish to npm.
#
# First ran 2026-07-20 and now has a track record: v0.1.2 and v0.1.3 went out end-to-end, Release +
# npm with provenance. The two earlier attempts failed on things only a real run could show — a
# Publish-type npm token (2FA-enforced → EOTP in CI, unfixable by retry) and a missing `repository`
# field (provenance binds the tarball to its repo). See SCORECARD.md.
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  id-token: write        # npm provenance
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Pin npm, not just Node. Node 22 ships npm 10; local dev and Dependabot write lockfiles with
      # npm 11, and npm 10's `npm ci` REJECTS an npm 11 lock ("Missing: esbuild@0.28.1 from lock
      # file") while npm 11 reads either. Unpinned, the npm that writes the lock and the npm that
      # reads it drift apart and every Dependabot PR fails on `npm ci` — which is exactly what
      # happened to all six of them. See LEARNINGS item 31.
      - run: npm i -g npm@11
      - name: Guard — tag matches manifest.json AND package.json
        # Two manifests carry a version and nothing else compares them, so a release can otherwise
        # ship a .mcpb and an npm package claiming different versions.
        run: |
          VER="${GITHUB_REF_NAME#v}"
          MAN="$(node -p "require('./manifest.json').version")"
          PKG="$(node -p "require('./package.json').version")"
          [ "$VER" = "$MAN" ] || { echo "::error::tag $VER != manifest.json $MAN"; exit 1; }
          [ "$VER" = "$PKG" ] || { echo "::error::tag $VER != package.json $PKG"; exit 1; }
      - run: npm ci
      - name: Build + pack the .mcpb (production-only staging)
        # bin/bundle.mjs, not `mcpb pack .`: the naive form shipped 27 MB / 142 packages including
        # vitest and an 8.3 MB macOS-only binary inside a 3-platform bundle, while the audit that
        # read "0 vulns" was measuring a different tree. bundle.mjs refuses to pack either.
        run: npm run bundle
      - name: GitHub Release + attach .mcpb
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          VER="${GITHUB_REF_NAME#v}"
          NAME="$(node -p "require('./package.json').name.split('/').pop()")"
          awk "/^## \[$VER\]/{f=1;next} /^## \[/{f=0} f" CHANGELOG.md > notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md "$NAME.mcpb"
      - name: Publish to npm (scoped, public)
        # The unscoped name `brreg-mcp-server` is already taken on npm (v1.0.0, someone else's).
        # Only @nordio/ is ours.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Everything above proves the code builds and the artifact uploads. Neither proves the thing a
  # stranger installs works. Three defects shipped through a fully green pipeline before this job
  # existed: `npx -y <pkg>` could not resolve an executable, provenance was rejected for a missing
  # `repository`, and serverInfo.version was a literal that had drifted two patches behind. Each was
  # found by hand, afterwards. This job is that hand-check, made unskippable.
  #
  # It installs from the PUBLIC registry in a clean directory — never the build tree, never a local
  # tarball — because every one of those bugs was invisible from inside the repo.
  smoke:
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      # Pin npm, not just Node. Node 22 ships npm 10; local dev and Dependabot write lockfiles with
      # npm 11, and npm 10's `npm ci` REJECTS an npm 11 lock ("Missing: esbuild@0.28.1 from lock
      # file") while npm 11 reads either. Unpinned, the npm that writes the lock and the npm that
      # reads it drift apart and every Dependabot PR fails on `npm ci` — which is exactly what
      # happened to all six of them. See LEARNINGS item 31.
      - run: npm i -g npm@11
      - name: Wait for the registry to serve the new version
        # npm publish returns before the version is resolvable; polling beats a fixed sleep.
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 30); do
            if [ "$(npm view @nordio/brreg-mcp-server@"$VER" version 2>/dev/null)" = "$VER" ]; then
              echo "registry serving $VER after ~$((i*10))s"; exit 0
            fi
            sleep 10
          done
          echo "::error::@nordio/brreg-mcp-server@$VER never became resolvable"; exit 1
      - name: npx resolves, speaks MCP, and reports the released version
        shell: bash
        working-directory: ${{ runner.temp }}   # outside any checkout, like a real user
        run: |
          VER="${GITHUB_REF_NAME#v}"
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"1"}}}' \
            | npx -y @nordio/brreg-mcp-server@"$VER" > handshake.json 2>err.txt || {
                echo "::error::npx could not run the package"; cat err.txt; exit 1; }
          node -e '
            const fs = require("fs");
            const want = process.argv[1];
            const line = fs.readFileSync("handshake.json", "utf8").split("\n").find(Boolean);
            if (!line) { console.error("::error::no response on stdout"); process.exit(1); }
            const info = JSON.parse(line).result?.serverInfo;
            if (!info) { console.error("::error::no serverInfo in initialize result"); process.exit(1); }
            if (info.version !== want) {
              console.error(`::error::serverInfo.version is ${info.version}, released ${want}`);
              process.exit(1);
            }
            console.log(`ok: ${info.name} ${info.version}`);
          ' "$VER"
      - name: The .mcpb on the Release is a real bundle at the released version
        shell: bash
        working-directory: ${{ runner.temp }}
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          VER="${GITHUB_REF_NAME#v}"
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --pattern '*.mcpb' --dir .
          unzip -o -q ./*.mcpb -d bundle
          node -e '
            const m = require("./bundle/manifest.json");
            const want = process.argv[1];
            if (m.version !== want) {
              console.error(`::error::.mcpb manifest is ${m.version}, released ${want}`);
              process.exit(1);
            }
            if (!m.tools?.length) { console.error("::error::.mcpb declares no tools"); process.exit(1); }
            console.log(`ok: ${m.name} ${m.version}, ${m.tools.length} tools`);
          ' "$VER"
