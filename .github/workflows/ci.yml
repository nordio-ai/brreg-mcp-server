name: ci

on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Tier 1 — hermetic. Blocks merges. Never touches the network, so brreg's uptime can never
  # train anyone to ignore a red build.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The default audience is Claude Desktop, and most of them are on Windows. Green on all
        # three IS the cross-platform guarantee — you don't need a PC, CI has one.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      # Pin npm, not just Node. Node 22 ships npm 10; local dev and Dependabot write lockfiles with
      # npm 11, and npm 10's `npm ci` REJECTS an npm 11 lock ("Missing: esbuild@0.28.1 from lock
      # file") while npm 11 reads either. Unpinned, the npm that writes the lock and the npm that
      # reads it drift apart and every Dependabot PR fails on `npm ci` — which is exactly what
      # happened to all six of them. See LEARNINGS item 31.
      - run: npm i -g npm@11
      - run: npm ci --ignore-scripts   # postinstall is the live npm attack vector
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Proves the .mcpb entry point actually starts and speaks MCP on this OS — a build that
      # compiles but can't handshake is not a passing build.
      - name: smoke the stdio entry point (offline)
        shell: bash
        run: |
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            | node dist/stdio.js --mock 2>/dev/null | grep -q '"brreg-mcp"'

  # Tier 2 — supply chain. Blocks merges: there are no secrets to scan for, but a committed
  # person's name is the thing this must catch.
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: npm }
      # Pin npm, not just Node. Node 22 ships npm 10; local dev and Dependabot write lockfiles with
      # npm 11, and npm 10's `npm ci` REJECTS an npm 11 lock ("Missing: esbuild@0.28.1 from lock
      # file") while npm 11 reads either. Unpinned, the npm that writes the lock and the npm that
      # reads it drift apart and every Dependabot PR fails on `npm ci` — which is exactly what
      # happened to all six of them. See LEARNINGS item 31.
      - run: npm i -g npm@11
      - run: npm ci --ignore-scripts
      # The tree that actually ships to a Desktop user who cannot audit it: zero tolerance.
      # Two runtime deps (server-kit + zod), so this is a bar we can actually hold.
      - name: dependency audit — shipped tree
        run: npm audit --omit=dev --audit-level=low
      # Dev tooling can't reach a user, but a red audit that everyone ignores is worse than none.
      - name: dependency audit — dev tooling
        run: npm audit --audit-level=high
      - name: no real personal data in fixtures
        run: node bin/check-no-pii.mjs

  # A generated artifact whose regeneration is never checked is a hand-typed table with extra steps.
  # Non-blocking: SSB is a third party and its availability is not our merge gate — but drift must be
  # visible. If this goes red, either SSB republished (fold it in) or someone hand-edited the table.
  nace-drift:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with: { node-version: 22 }
      # Pin npm, not just Node. Node 22 ships npm 10; local dev and Dependabot write lockfiles with
      # npm 11, and npm 10's `npm ci` REJECTS an npm 11 lock ("Missing: esbuild@0.28.1 from lock
      # file") while npm 11 reads either. Unpinned, the npm that writes the lock and the npm that
      # reads it drift apart and every Dependabot PR fails on `npm ci` — which is exactly what
      # happened to all six of them. See LEARNINGS item 31.
      - run: npm i -g npm@11
      - run: npm run nace:build
      - run: git diff --exit-code src/nace-table.ts

  # Tier 3 — live canary. NON-blocking by design: brreg is a third party and its availability
  # is not our merge gate. It exists to tell us when the REGISTER changed under us.
  canary:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with: { node-version: 22, cache: npm }
      # Pin npm, not just Node. Node 22 ships npm 10; local dev and Dependabot write lockfiles with
      # npm 11, and npm 10's `npm ci` REJECTS an npm 11 lock ("Missing: esbuild@0.28.1 from lock
      # file") while npm 11 reads either. Unpinned, the npm that writes the lock and the npm that
      # reads it drift apart and every Dependabot PR fails on `npm ci` — which is exactly what
      # happened to all six of them. See LEARNINGS item 31.
      - run: npm i -g npm@11
      - run: npm ci --ignore-scripts
      - run: BRREG_LIVE=1 npx vitest run tests/live
